<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Панель Tender AI{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <nav class="nav-links">
        {% if current_user %}
        <a href="/web">Дашборд</a>
        <a href="/web/tenders">Тендеры</a>
        <form action="/web/logout" method="post" class="inline-form">
          <button type="submit" class="link-button">Выход</button>
        </form>
        {% else %}
        <a href="/web/login">Вход</a>
        {% endif %}
      </nav>
      <div class="version-box">
        <span>Версия: {{ version_info.version }}</span>
        <span>Alembic: {{ version_info.migrations_head }}</span>
      </div>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
