{% extends "base.html" %}
{% block title %}Вход | Tender AI{% endblock %}
{% block content %}
<section class="card login-card">
  <h1>Вход в веб-кабинет</h1>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form action="/web/login" method="post" class="grid-form">
    <label>Эл. почта
      <input type="email" name="email" required />
    </label>
    <label>Пароль
      <input type="password" name="password" required />
    </label>
    <button type="submit">Войти</button>
  </form>
</section>
{% endblock %}
