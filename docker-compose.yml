services:
  tender_ai_db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tender_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - tender_ai_pgdata:/var/lib/postgresql/data

  tender_ai_app:
    image: ghcr.io/kamniking-art/tender-ai-backend:${APP_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_VERSION: ${APP_VERSION:-unknown}
      APP_BUILT_AT: ${APP_BUILT_AT:-unknown}
      DB_NAME: ${DB_NAME:-tender_ai}
      DB_USER: ${DB_APP_USER:-tender_app}
      DB_PASSWORD: ${DB_APP_PASSWORD:-tender_app}
      DB_HOST: ${DB_HOST:-tender_ai_db}
      DB_PORT: ${DB_PORT:-5432}
      DATABASE_URL: postgresql+asyncpg://${DB_APP_USER:-tender_app}:${DB_APP_PASSWORD:-tender_app}@${DB_HOST:-tender_ai_db}:${DB_PORT:-5432}/${DB_NAME:-tender_ai}
      DATABASE_URL_SYNC: postgresql+psycopg2://${DB_APP_USER:-tender_app}:${DB_APP_PASSWORD:-tender_app}@${DB_HOST:-tender_ai_db}:${DB_PORT:-5432}/${DB_NAME:-tender_ai}
    depends_on:
      - tender_ai_db
    ports:
      - "${APP_EXTERNAL_PORT:-8000}:8000"
    volumes:
      - tender_ai_storage:/data

volumes:
  tender_ai_pgdata:
  tender_ai_storage:
